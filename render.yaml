# Render service configuration (example). Fill repo/branch as needed.
version: 0
services:
  - type: web
    name: facebook-monitoring-backend
    env: docker
    plan: free
    branch: main
    dockerfilePath: Dockerfile
    envVars:
      - key: DATABASE_URL
        value: ""
      - key: RENDER
        value: "true"
      - key: SECRET_KEY
        value: ""
      - key: ADMIN_EMAIL
        value: ""
      - key: SMTP_HOST
        value: ""
      - key: SMTP_PORT
        value: ""
      - key: SMTP_USER
        value: ""
      - key: SMTP_PASSWORD
        value: ""
