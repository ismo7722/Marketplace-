# Render Blueprint — backend only (Root Directory = backend)
version: 0
services:
  - type: web
    name: facebook-monitoring-backend
    env: docker
    plan: free
    branch: master
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        value: ""
      - key: RENDER
        value: "true"
      - key: SECRET_KEY
        value: ""
      - key: ADMIN_EMAIL
        value: ""
      - key: ADMIN_PASSWORD
        value: ""
      - key: CORS_ORIGINS
        value: ""
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: ""
      - key: SMTP_PASSWORD
        value: ""
